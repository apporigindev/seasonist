name: iOS — Build & Upload to TestFlight

# Manual trigger only — run it from the Actions tab when a build is ready
# for beta testers. Requires the signing/ASC secrets described in
# docs/ios-testflight-setup.md.
on:
  workflow_dispatch: {}

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Apple requires apps to be built with the iOS 26 SDK (Xcode 26+). The
      # runner ships several Xcodes; select the newest so uploads aren't
      # rejected with a "built with the iOS 18.x SDK" validation error.
      - name: Select the latest Xcode
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS dependencies
        run: npm ci

      # Stamp the service-worker cache version so each build invalidates the old
      # cache (otherwise an updated app can serve stale JS on first launch).
      - name: Stamp service-worker cache version
        run: |
          STAMP="${GITHUB_SHA:0:8}-${GITHUB_RUN_NUMBER}"
          sed -i.bak "s/__BUILD__/$STAMP/" www/sw.js && rm -f www/sw.js.bak
          grep "const BUILD" www/sw.js

      # The x-api-key for the try-on backend is never committed (public repo);
      # stamp it into the app bundle here. Empty secret → feature stays off.
      - name: Stamp try-on API key
        env:
          SEASONIST_APP_API_KEY: ${{ secrets.SEASONIST_APP_API_KEY }}
        run: |
          if [ -n "$SEASONIST_APP_API_KEY" ]; then
            sed -i.bak "s/export const APP_API_KEY = \"\";/export const APP_API_KEY = \"$SEASONIST_APP_API_KEY\";/" www/js/config.js && rm -f www/js/config.js.bak
            grep -q "$SEASONIST_APP_API_KEY" www/js/config.js && echo "API key stamped."
          else
            echo "::warning::SEASONIST_APP_API_KEY not set — try-on requests will be rejected by the backend."
          fi

      - name: Sync web app into the iOS project
        run: npx cap sync ios

      - name: Setup Ruby (Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          # No committed Gemfile.lock (unresolvable on the Windows dev
          # machine) — resolve gems fresh here.
          bundler-cache: false
          bundler: latest

      - name: Install Ruby gems
        run: bundle install

      - name: Import Distribution certificate into a temporary keychain
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/ci-signing.keychain-db"

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Xcode 16+ reads profiles from UserData; older tooling from
          # MobileDevice — install into both.
          LEGACY_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          XCODE16_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$LEGACY_DIR" "$XCODE16_DIR"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$LEGACY_DIR/ci.mobileprovision"
          cp "$LEGACY_DIR/ci.mobileprovision" "$XCODE16_DIR/ci.mobileprovision"

      - name: Build and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
        run: bundle exec fastlane ios beta
        working-directory: ios/App

      - name: Clean up temporary keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true
